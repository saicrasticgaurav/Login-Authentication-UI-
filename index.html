<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOG IN SYSTEM</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1>Signup</h1>
        <form id="signupForm">
            <div class="form-group">
                <label for="fullname">Full Name</label>
                <div class="input-box">
                    <input type="text" id="fullname" placeholder="Type Name Here">
                   <i class="fa-solid"></i>
                </div>
                <span id="nameError"></span>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <div class="input-box">
                    <input type="email" id="email"placeholder="Type Email Here">
                    <i class="fa-solid"></i>
                </div>
                <span id="emailError"></span>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-box">
                    <input type="password" id="password"placeholder="Type Password Here">
                     <i class="fa-solid"id="togglePassword"></i>
                </div>
                <span id="passwordError"></span>
            </div>

            <input type="submit"value="Create Account" id="submitBtn">
        </form>
        <p class="login-text"> Already have an account? <a href="#">Login</a></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
